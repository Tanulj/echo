<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Echo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    .overlay-container {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
      background: rgba(26, 26, 46, 0.95);
      border-radius: 50%;
      border: 2px solid rgba(0, 217, 255, 0.5);
      box-shadow: 0 0 30px rgba(0, 217, 255, 0.4), 0 4px 20px rgba(0, 0, 0, 0.5);
      animation: pulse-glow 1.5s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 25px rgba(0, 217, 255, 0.4), 0 4px 20px rgba(0, 0, 0, 0.5); }
      50% { box-shadow: 0 0 40px rgba(0, 217, 255, 0.6), 0 4px 25px rgba(0, 0, 0, 0.5); }
    }

    .sound-waves {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      height: 30px;
    }

    .wave {
      width: 4px;
      background: linear-gradient(180deg, #00d9ff, #00ff88);
      border-radius: 2px;
      animation: wave-animation 0.5s ease-in-out infinite;
    }

    .wave:nth-child(1) { animation-delay: 0s; }
    .wave:nth-child(2) { animation-delay: 0.1s; }
    .wave:nth-child(3) { animation-delay: 0.2s; }
    .wave:nth-child(4) { animation-delay: 0.1s; }
    .wave:nth-child(5) { animation-delay: 0s; }

    @keyframes wave-animation {
      0%, 100% { height: 8px; opacity: 0.6; }
      50% { height: 26px; opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="overlay-container">
    <div class="sound-waves">
      <span class="wave"></span>
      <span class="wave"></span>
      <span class="wave"></span>
      <span class="wave"></span>
      <span class="wave"></span>
    </div>
  </div>
</body>
</html>
